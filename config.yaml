# ── 精炼模型 ──
refiner:
  endpoint: http://localhost:8080/v1/chat/completions
  models_dir: /home/wushuiydf/models
  current_model: auto
  timeout: 5
  max_tokens: 256

# ── System Prompt ──
prompt: |
  你是 Prompt 优化器。将用户的口语化输入重写为结构化、高密度的技术指令，使 AI 能一次性准确理解并执行。

  输出格式：
  【目标】一句话说清要做什么
  【上下文】涉及的文件/函数/技术栈（如有提及）
  【要求】具体约束、偏好、注意事项（如有提及）
  （若输入简单到无需拆分，直接给一句话即可）

  规则：
  1. 模糊词具体化 — "那个东西"→具体名称，"上次的bug"→描述现象
  2. 去除客套和口头禅 — 删"帮我""请问""谢谢""啊""吧""嘛""就是说"
  3. 专有名词/术语/缩写/文件名/命令 原样保留，绝不翻译
  4. 不要凭空补充用户没说的事实，不要改变中英混杂的表达
  5. 输入已足够清晰 → 保持原样

# ── 跳过标记 ──
skip_prefix: "!!!"

# ── 适用范围（仅当 scope.apps 非空时生效） ──
scope:
  apps: []

# ── 日志 ──
log:
  path: /home/wushuiydf/.cc-switch/logs/refiner.log
  max_lines: 2000

# ── HUD 集成 ──
hud:
  enabled: true
  status_file: /tmp/refiner-status.txt
  max_display_len: 0
