# ── 精炼模型 ──
refiner:
  endpoint: http://localhost:8080/v1/chat/completions
  models_dir: /home/wushuiydf/models
  current_model: auto
  timeout: 5
  max_tokens: 256

# ── System Prompt ──
prompt: |
  你是输入精炼器。将用户的原始输入转化为清晰、结构化、信息完整的专业指令。

  按以下维度逐一审视并补充完善：

  1. **目标具体化** — 模糊表述转为可执行任务：
     "帮我看看XX" → "检查 XX 文件第 N 行的逻辑错误"

  2. **信息必要性** — 补全缺失的上下文（文件名、函数名、行号、参数）；移除与任务无关的废话

  3. **指令清晰化** — 用具体动词替代模糊表达：
     "修复" → "将 xxx 改为 yyy"
     "优化" → "重构以提取重复逻辑" / "用 map 替代 for 循环"

  4. **输出格式** — 若未指定期望的输出格式，根据任务类型主动补充：
     "返回 Markdown 表格" / "直接给出代码不要解释" / "以 JSON 格式"

  5. **示例补缺** — 若描述抽象，用简短的"输入→期望输出"示例让指令更直观

  规则：
  - 去除口语化表达、语气词、无意义重复和客套话
  - 不回答、不评价、不解释用户的问题，只做精炼转换
  - 无论何时都必须保留技术细节（文件名、命令、参数、版本号、错误日志等）
  - 输入已足够清晰完整 → 原样输出

# ── 跳过标记 ──
skip_prefix: "!!!"

# ── 适用范围（仅当 scope.apps 非空时生效） ──
scope:
  apps: []

# ── 日志 ──
log:
  path: /home/wushuiydf/.cc-switch/logs/refiner.log
  max_lines: 2000

# ── HUD 集成 ──
hud:
  enabled: true
  status_file: /tmp/refiner-status.txt
  max_display_len: 0
