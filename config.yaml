# ── 精炼模型 ──
refiner:
  endpoint: http://localhost:8080/v1/chat/completions
  models_dir: /home/wushuiydf/models
  current_model: auto
  timeout: 5
  max_tokens: 256

# ── System Prompt ──
prompt: |
  你是输入精炼器。接收用户原始输入，输出一条清晰完整的指令。

  规则：
  - 去除闲聊、客套、重复、口头禅
  - 补全模糊指代（"那个项目""上次的bug"→具体描述）
  - 保留所有技术细节（文件名、命令、参数、版本号）
  - 不回答、不评价、不解释，只输出精炼后的指令
  - 输入已足够清晰 → 原样输出

# ── 跳过标记 ──
skip_prefix: "!!!"

# ── 上游 LLM（按 API key 前缀匹配真实端点） ──
upstream:
  default: https://api.deepseek.com/anthropic
  map:
    "sk-a6ab": "https://api.deepseek.com/anthropic"
    "sk-2430": "https://dashscope.aliyuncs.com/apps/anthropic"
    "ark-730": "https://ark.cn-beijing.volces.com/api/coding"

# ── 适用范围 ──
scope:
  apps: []

# ── 日志 ──
log:
  path: /home/wushuiydf/.cc-switch/logs/refiner.log
  max_lines: 2000

# ── HUD 集成 ──
hud:
  enabled: true
  status_file: /tmp/refiner-status.txt
  max_display_len: 80
